<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>🗞️ AI 日报 — 2026年6月11日 — AI 科技日报</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
    --bg:#0a0f1a;
    --card:#121a29;
    --text:#cbd5e1;
    --muted:#64748b;
    --accent:#60a5fa;
    --success:#34d399;
    --warning:#fbbf24;
    --danger:#f87171;
    --card-hover:#162032;
}
html{scroll-behavior:smooth}
body{
    font-family:'Inter',-apple-system,sans-serif;
    font-size:15px;line-height:1.55;
    background:var(--bg);color:var(--text);
    font-weight:400;
}
a{color:var(--accent);text-decoration:underline;text-underline-offset:3px;font-family:'JetBrains Mono',monospace;font-size:13px}
a:hover{color:#93c5fd}
.container{max-width:1400px;margin:0 auto;padding:32px 16px}
h1{font-size:22px;font-weight:600;margin-bottom:8px;color:var(--text)}
.delayed{color:var(--warning);font-size:13px;margin-bottom:24px}
.section{margin-bottom:24px}
.section-title{font-size:18px;font-weight:600;margin-bottom:12px;color:var(--text);text-transform:uppercase;letter-spacing:.03em}
.cards{display:flex;flex-direction:column;gap:16px}
.card{
    background:var(--card);border-radius:4px;padding:12px;
    box-shadow:0 1px 2px rgba(0,0,0,.3);
    cursor:pointer;transition:background .15s;
    position:relative;
}
.card:hover{background:var(--card-hover)}
.card-title{font-size:16px;font-weight:600;color:var(--accent);margin-bottom:4px;line-height:1.4}
.card-body{font-size:15px;color:var(--text);margin-bottom:8px;line-height:1.55}
.card-body br{display:block;content:'';margin-top:8px}
.card-link{font-size:13px;word-break:break-all;display:inline-block;position:relative;z-index:2}
.card-link:hover{color:#93c5fd!important}
footer{text-align:center;color:var(--muted);font-size:13px;margin-top:32px;padding-top:16px;border-top:1px solid var(--card)}
/* Archive bar */
.archive-bar{
    display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px;
    padding-bottom:16px;border-bottom:1px solid var(--card);
}
.archive-bar a{
    font-size:13px;color:var(--muted);text-decoration:none;
    padding:2px 8px;border-radius:3px;font-family:'Inter',sans-serif;
    transition:color .15s,background .15s;
}
.archive-bar a:hover,.archive-bar a.active{color:var(--accent);background:var(--card)}
/* Back to top */
#back-top{
    position:fixed;bottom:24px;right:24px;
    width:36px;height:36px;border-radius:50%;
    background:var(--card);color:var(--muted);
    border:1px solid var(--muted);cursor:pointer;
    display:none;align-items:center;justify-content:center;
    font-size:18px;z-index:100;transition:color .15s,border-color .15s;
}
#back-top:hover{color:var(--accent);border-color:var(--accent)}
#back-top.visible{display:flex}
@media(max-width:768px){
    .container{padding:16px 12px}
    h1{font-size:20px}
    .section-title{font-size:16px}
    .card-title{font-size:15px}
    .card-body{font-size:14px}
}
</style>
</head>
<body>
<div class="container">
    <h1>🗞️ AI 日报 — 2026年6月11日</h1>
    <p class="delayed">⏰ 今日延迟发送，请见谅。</p>
    <nav class="archive-bar"><a href="2026-06-16.html">06-16</a><a href="2026-06-15.html">06-15</a><a href="2026-06-14.html">06-14</a><a href="2026-06-13.html">06-13</a><a href="2026-06-12.html">06-12</a><a href="2026-06-11.html" class="active">06-11</a><a href="2026-06-09.html">06-09</a><a href="2026-06-08.html">06-08</a></nav>
    <section class="section">
    <h2 class="section-title">🔥 GitHub 热门</h2>
    <div class="cards"></div>
</section>
    <footer>🤖 follow-news v4.0</footer>
</div>
<button id="back-top" title="Back to top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
<script>
// Card click → open first link in new tab
document.querySelectorAll('.card[data-href]').forEach(el=>{
    el.addEventListener('click',function(e){
        if(e.target.closest('a'))return;
        window.open(this.dataset.href,'_blank','noopener')
    })
})
// Back to top visibility
const btn=document.getElementById('back-top')
window.addEventListener('scroll',function(){
    btn.classList.toggle('visible',window.scrollY>500)
})
</script>
</body>
</html>
